name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v7

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build Release
      run: dotnet build --configuration Release --no-restore

    - name: Publish Self-Contained
      run: dotnet publish EmojiPicker/EmojiPicker.csproj --configuration Release --runtime win-x64 --self-contained true --output ./publish

    - name: Publish Framework-Dependent (lite)
      run: dotnet publish EmojiPicker/EmojiPicker.csproj --configuration Release --runtime win-x64 --self-contained false --output ./publish-lite

    - name: Create Release Archives
      run: |
        Compress-Archive -Path ./publish/* -DestinationPath ./Classic-EmojiPicker-${{ github.ref_name }}-portable-win-x64.zip
        Compress-Archive -Path ./publish-lite/* -DestinationPath ./Classic-EmojiPicker-${{ github.ref_name }}-portable-lite-win-x64.zip

    - name: Install Inno Setup
      run: choco install innosetup --no-progress -y

    - name: Build Installers
      run: |
        $version = "${{ github.ref_name }}".TrimStart('v')
        & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
          "/DAppVersion=$version" `
          "/DPublishDir=$(Resolve-Path ./publish)" `
          installer/EmojiPicker.iss
        & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
          "/DAppVersion=$version" `
          "/DPublishDir=$(Resolve-Path ./publish-lite)" `
          "/DFrameworkDependent=1" `
          installer/EmojiPicker.iss
      shell: pwsh

    - name: Install WiX
      run: |
        dotnet tool install --global wix --version 6.0.2
        wix extension add --global WixToolset.UI.wixext/6.0.2
        wix extension add --global WixToolset.Util.wixext/6.0.2

    - name: Build MSI
      shell: pwsh
      run: |
        $version = "${{ github.ref_name }}".TrimStart('v')
        # MSI ProductVersion must be numeric a.b.c; a prerelease suffix (e.g.
        # -rc1) is stripped, so a later final tag upgrades via
        # AllowSameVersionUpgrades in Package.wxs
        $msiVersion = ($version -split '-')[0]
        wix build installer/msi/Package.wxs `
          -arch x64 `
          -d Version=$msiVersion `
          -d "PublishDir=$(Resolve-Path ./publish)" `
          -ext WixToolset.UI.wixext -ext WixToolset.Util.wixext `
          -o ./Classic-EmojiPicker-${{ github.ref_name }}-setup-win-x64.msi

    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        files: |
          ./Classic-EmojiPicker-${{ github.ref_name }}-portable-win-x64.zip
          ./Classic-EmojiPicker-${{ github.ref_name }}-portable-lite-win-x64.zip
          ./Classic-EmojiPicker-${{ github.ref_name }}-setup-win-x64.msi
          ./installer/output/Classic-EmojiPicker-*-setup*-win-x64.exe
        name: Classic Emoji Picker ${{ github.ref_name }}
        body: |
          ## Classic Emoji Picker ${{ github.ref_name }}

          **Recommended:** download `Classic-EmojiPicker-<version>-setup-win-x64.exe` and run it.
          It asks whether to install for all users or just you (per-user needs no admin).
          Tick "Start with Windows" so **Win+.** opens this picker after every sign-in.

          | Download | Size | Needs |
          |---|---|---|
          | `Classic-EmojiPicker-<version>-setup-win-x64.exe` | larger | nothing - runtime included |
          | `Classic-EmojiPicker-<version>-setup-lite-win-x64.exe` | small | [.NET Desktop Runtime 8 (x64)](https://dotnet.microsoft.com/download/dotnet/8.0) - setup checks and links it if missing |
          | `Classic-EmojiPicker-<version>-setup-win-x64.msi` | larger | nothing - per-machine, for silent/enterprise deploys: `msiexec /i <file> /qn` (add `AUTOSTART=0` to skip the Run key) |

          The `-portable-*.zip` files are the same two builds in portable form - extract and run `EmojiPicker.exe`.
          Silent Setup.exe installs: `/VERYSILENT /SUPPRESSMSGBOXES /ALLUSERS|/CURRENTUSER /TASKS=startup`.

          ### "Windows protected your PC" / SmartScreen
          These downloads aren't code-signed yet, so Windows may warn about an unrecognised app. Either click **More info -> Run anyway** at the prompt, or right-click the file -> **Properties** -> tick **Unblock** -> **OK** before running. The files are safe; code signing to remove the warning is planned.

          ### What's New
          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

          ### Requirements
          - Windows 11 or Windows 10 (version 1809+)
          - Full installer/zip and MSI: no additional dependencies; lite: .NET Desktop Runtime 8 (x64)
        draft: false
        prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
